# Supabase local config. See docs.supabase.com/guides/cli/config for details.

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.evidence]
public = false
file_size_limit = "10MiB"
allowed_mime_types = [
  "application/pdf",
  "image/png",
  "image/jpeg",
  "image/webp",
  "text/plain",
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
]

[storage.buckets.reports]
public = false
file_size_limit = "50MiB"
allowed_mime_types = ["application/pdf"]

[storage.buckets.scan-uploads]
public = false
file_size_limit = "50MiB"
allowed_mime_types = [
  "text/xml",
  "application/xml",
  "text/csv",
  "application/octet-stream"
]

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 12

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # Set to true in production

[functions.sla-recalculate]
verify_jwt = false

[[cron.jobs]]
name = "sla-recalculate"
schedule = "0 6 * * *"
command = "SELECT net.http_post('http://127.0.0.1:54321/functions/v1/sla-recalculate', '{}', 'application/json');"
